<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status | GovSecAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/user.css">
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" class="logo">
                <i class="fas fa-shield-halved"></i>
                GovSecAI
            </a>
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Go Back
            </a>
        </nav>

        <header>
            <h1>Track Complaint</h1>
            <p class="subtitle">Enter your reference ID to see current progress and department updates.</p>
        </header>

        <div class="form-container" style="max-width: 600px; margin: 2rem auto;">
            <div class="form-group">
                <label>Reference ID</label>
                <input type="text" id="track-id" placeholder="e.g. 51ecd079-4477-49c5-83ec-a53bd97eeb69">
            </div>
            <button class="btn" onclick="trackComplaint()">Check Status</button>
        </div>

        <div id="recent-history-section" style="display: none;" class="history-container">
            <h2 class="history-title">
                <i class="fas fa-clock-rotate-left"></i>
                Your Recent Complaints
            </h2>
            <div id="history-list" class="history-list">
                <!-- Injected via JS -->
            </div>
        </div>

        <div id="track-result" style="display: none;">
            <div class="result-card">
                <div id="status-badge-container" style="margin-bottom: 1.5rem;">
                    <span class="status-badge status-pending" id="res-status">Pending</span>
                </div>
                <h3 id="res-type">Road Complaint</h3>
                <p id="res-city-area" style="color: var(--text-muted); margin: 0.5rem 0 1.5rem;">Ahmedabad - Area 5</p>
                <div style="text-align: left; background: var(--glass); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--border);">
                    <label style="font-size: 0.8rem; text-transform: uppercase;">Description</label>
                    <p id="res-desc" style="font-size: 1rem; line-height: 1.6;">Description goes here...</p>
                </div>
            </div>
        </div>

        <div id="track-error" style="display: none; text-align: center; color: #ef4444; margin-top: 2rem;">
            <i class="fas fa-triangle-exclamation" style="font-size: 2rem; margin-bottom: 1rem;"></i>
            <p>We couldn't find a complaint with that ID. Please check and try again.</p>
        </div>
    </div>

    <script src="js/user.js"></script>
</body>
</html>
